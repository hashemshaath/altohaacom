  <body>
    <!-- GTM noscript fallback injected dynamically -->
    <div id="root">
      <div style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:#fff;font-family:system-ui,sans-serif">
        <div style="text-align:center">
          <div style="width:40px;height:40px;border:3px solid #e5e5e5;border-top-color:#b8860b;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto"></div>
          <p id="boot-loader-text" style="margin-top:16px;color:#888;font-size:14px">Loading...</p>
        </div>
      </div>
    </div>
    <script>
      (function () {
        var BOOT_TIMEOUT_MS = 25000;
        var BOOT_STATE_ATTR = "data-app-boot";
        var BOOT_HARD_RELOAD_ONCE_KEY = "altoha-boot-hard-reload-once";

        function getBootTextEl() {
          return document.getElementById("boot-loader-text");
        }

        function getHardReloaded() {
          try {
            return window.sessionStorage.getItem(BOOT_HARD_RELOAD_ONCE_KEY) === "1";
          } catch {
            return false;
          }
        }

        function setHardReloaded(value) {
          try {
            if (value) {
              window.sessionStorage.setItem(BOOT_HARD_RELOAD_ONCE_KEY, "1");
              return;
            }
            window.sessionStorage.removeItem(BOOT_HARD_RELOAD_ONCE_KEY);
          } catch {
            // Ignore restricted storage environments
          }
        }

        async function hardReload() {
          setHardReloaded(true);

          try {
            if ("serviceWorker" in navigator) {
              var regs = await navigator.serviceWorker.getRegistrations();
              await Promise.allSettled(regs.map(function (r) { return r.unregister(); }));
            }
            if ("caches" in window) {
              var keys = await caches.keys();
              await Promise.allSettled(keys.map(function (k) { return caches.delete(k); }));
            }
          } catch {
            // Ignore cleanup failures and continue reload
          }

          var url = new URL(window.location.href);
          url.searchParams.set("__boot_retry", String(Date.now()));
          window.location.replace(url.toString());
        }

        function normalReload() {
          setHardReloaded(false);

          var url = new URL(window.location.href);
          url.searchParams.set("__boot_retry", String(Date.now()));
          window.location.replace(url.toString());
        }

        function bindRetry(text, mode) {
          var el = getBootTextEl();
          if (!el) return;
          el.textContent = text;
          el.style.cursor = "pointer";
          el.onclick = function () {
            if (mode === "hard") {
              hardReload();
              return;
            }
            normalReload();
          };
        }

        window.__handleBootScriptError = function () {
          bindRetry("App files failed to load — tap to refresh", "hard");
        };

        window.__markBootScriptLoaded = function () {
          if (document.documentElement.getAttribute(BOOT_STATE_ATTR) !== "ready") {
            document.documentElement.setAttribute(BOOT_STATE_ATTR, "starting");
          }
        };

        window.__markBootReady = function () {
          document.documentElement.setAttribute(BOOT_STATE_ATTR, "ready");
          setHardReloaded(false);
        };

        setTimeout(function () {
          var bootState = document.documentElement.getAttribute(BOOT_STATE_ATTR);

          if (bootState === "ready") {
            return;
          }

          if (!navigator.onLine) {
            bindRetry("You appear offline — reconnect and tap to retry", "normal");
            return;
          }

          if (!bootState) {
            if (!getHardReloaded()) {
              hardReload();
              return;
            }

            bindRetry("Still loading — tap to hard reload", "hard");
            return;
          }

          if (bootState === "starting") {
            bindRetry("App is taking longer than expected — tap to hard reload", "hard");
            return;
          }

          bindRetry("Still loading — tap to hard reload", "hard");
        }, BOOT_TIMEOUT_MS);
      })();
    </script>
    <script type="module" src="/src/main.tsx" onerror="window.__handleBootScriptError && window.__handleBootScriptError(event)"></script>
